spring.application.name=vehiclerental

#spring.datasource.url=jdbc:mysql://localhost:3306/vehiclerental?createDatabaseIfNotExist=true
spring.datasource.url=jdbc:postgresql://localhost:5432/vehiclerental

spring.datasource.username=postgres
spring.datasource.password=root

server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=false

app.upload.dir=/uploads/vehicles

# Max total request size
spring.servlet.multipart.max-request-size=50MB

# Max single file size
spring.servlet.multipart.max-file-size=10MB

# (IMPORTANT) Max number of parts
server.tomcat.max-part-count=300
server.tomcat.max-swallow-size=-1


#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true

#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.enabled=false
spring.threads.virtual.enabled=true
